services:
  # ─── Backend: Node.js Web Service ───────────────────────────────────────────
  - type: web
    name: zenmind-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false        # Set this in the Render dashboard
      - key: JWT_SECRET
        sync: false        # Set this in the Render dashboard
      - key: FRONTEND_URL
        sync: false        # Set to your Render frontend URL

  # ─── Frontend: Static Site ───────────────────────────────────────────────────
  - type: web
    name: zenmind-frontend
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false        # Set to your Render backend URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
