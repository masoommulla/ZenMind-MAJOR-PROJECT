services:
  # ─── Backend: Node.js Web Service ───────────────────────────────────────────
  - type: web
    name: zenmind-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false

  # ─── Frontend: Web Service (serves built Vite app) ───────────────────────────
  - type: web
    name: zenmind-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: VITE_API_URL
        sync: false
